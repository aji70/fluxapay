name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "fluxapay_backend/**"
  pull_request:
    branches: ["main"]
    paths:
      - "fluxapay_backend/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/fluxapay-backend

jobs:
  quality-and-build:
    name: Backend Quality & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fluxapay_ci_placeholder?schema=public
    defaults:
      run:
        working-directory: ./fluxapay_backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fluxapay_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Format Check (Lint)
        run: npm run lint

      - name: Validate OpenAPI Specification
        run: npm run validate:openapi

      - name: Check Route Documentation Coverage
        run: npm run check:route-coverage -- --ci

      - name: Build Check
        run: npm run build

  unit-and-contract-tests:
    name: Backend Unit & Contract Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fluxapay_test?schema=public
      JWT_SECRET: ci-test-jwt-secret-key
      KMS_PROVIDER: local
      KMS_ENCRYPTION_PASSPHRASE: ci-test-passphrase-for-hd-wallet-secure
      HD_WALLET_MASTER_SEED: ci-test-master-seed-32chars-long-padded!!
      DISABLE_CRON: "true"
      WEBHOOK_SECRET: ci-test-webhook-secret
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      RESEND_API_KEY: re_test
      SMS_PROVIDER: mock
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      STELLAR_NETWORK_PASSPHRASE: Test SDF Network ; September 2015
      FUNDER_SECRET_KEY: SBXEHJKWF7C7BIFSUGXZE7XKFJ5SP6Y7JGPD4J4TKMX2MQXWQQRF3BSG
      MASTER_VAULT_SECRET_KEY: SDGHCAPDRWTOTBAQT6HJ5KBUZOECD2JEOH6E76NDL4OXNBXIWODLZA4B
      USDC_ISSUER_PUBLIC_KEY: GBVXGET7UCLTTLDZGVWDDMZ7FVLCNZL75GU7BLVPTWUP6UIVYHAY5OAX
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fluxapay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./fluxapay_backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fluxapay_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Sync database schema
        run: npx prisma db push

      - name: Run Unit Tests
        run: npm test

      - name: Run Contract Tests
        run: npm run test:contract
        env:
          PAYMENT_RATE_LIMIT_PER_MINUTE: "10000"

  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [quality-and-build, unit-and-contract-tests]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./fluxapay_backend
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate image digest
        id: digest
        run: echo "digest=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    environment:
      name: staging
      url: https://staging.fluxapay.com
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Image: ${{ needs.build-and-push-docker.outputs.image-tag }}"
          # Add actual deployment commands here (e.g., kubectl apply, helm upgrade, etc.)
          # Example:
          # kubectl set image deployment/fluxapay-backend fluxapay-backend=${{ needs.build-and-push-docker.outputs.image-tag }} -n staging
          # kubectl rollout status deployment/fluxapay-backend -n staging

      - name: Comment on PR with deployment info
        uses: actions/github-script@v7
        with:
          script: |
            const imageTag = '${{ needs.build-and-push-docker.outputs.image-tag }}';
            const imageDigest = '${{ needs.build-and-push-docker.outputs.image-digest }}';
            const stagingUrl = 'https://staging.fluxapay.com';
            
            const comment = `## 🚀 Staging Deployment Successful\n\n` +
              `**Image Tag:** \`${imageTag}\`\n` +
              `**Image Digest:** \`${imageDigest}\`\n` +
              `**Staging URL:** ${stagingUrl}\n\n` +
              `The staging environment has been updated with the latest changes from this PR.\n\n` +
              `Please test the changes and provide feedback.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.fluxapay.com
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Image: ${{ needs.build-and-push-docker.outputs.image-tag }}"
          # Add actual deployment commands here (e.g., kubectl apply, helm upgrade, etc.)
          # Example:
          # kubectl set image deployment/fluxapay-backend fluxapay-backend=${{ needs.build-and-push-docker.outputs.image-tag }} -n production
          # kubectl rollout status deployment/fluxapay-backend -n production

      - name: Notify on deployment success
        if: success()
        run: |
          echo "Production deployment successful!"
          # Add notification logic here (e.g., Slack, Discord, email, etc.)

      - name: Notify on deployment failure
        if: failure()
        run: |
          echo "Production deployment failed!"
          # Add notification logic here (e.g., Slack, Discord, email, etc.)
